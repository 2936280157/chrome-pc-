<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>链接变更提醒</title>
  <link rel="stylesheet" href="alert.css">
</head>
<body>
  <div class="card">
    <div class="alert-header">
      <img class="alert-icon" src="../icons/popup-alert.png" alt="">
      <div class="badge">链接变更监控</div>
    </div>
    <h1 id="title"></h1>
    <p id="message"></p>
    <p id="url" class="url hidden"></p>
    <div class="actions">
      <button id="btn-open" class="btn primary hidden">打开链接</button>
      <button id="btn-close" class="btn">关闭</button>
    </div>
  </div>
  <script src="alert.js"></script>
</body>
</html>
